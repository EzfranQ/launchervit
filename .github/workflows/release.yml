name: Build Application and Make Release

on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  build_release:
    name: Build Release
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      # Required for Azure Trusted Signing
      id-token: write
      # Required for vcpkg binary cache
      packages: write
    with:
      build-type: Release
      environment: Release
    secrets: inherit

  create_release:
    needs: build_release
    permissions:
      contents: write
    runs-on: ubuntu-slim
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "true"
          path: "LauncherVit-source"
      - name: Download artifacts
        uses: actions/download-artifact@v8
      - name: Grab and store version
        run: |
          tag_name=$(echo ${{ github.ref }} | grep -oE "[^/]+$")
          echo "VERSION=$tag_name" >> $GITHUB_ENV
      - name: Package artifacts properly
        run: |
          mv ${{ github.workspace }}/LauncherVit-source LauncherVit-${{ env.VERSION }}
          mv LauncherVit-Linux-Qt6-Portable*/LauncherVit-portable.tar.gz LauncherVit-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz
          mv LauncherVit-*.AppImage/LauncherVit-*-x86_64.AppImage LauncherVit-Linux-x86_64.AppImage
          mv LauncherVit-*.AppImage.zsync/LauncherVit-*-x86_64.AppImage.zsync LauncherVit-Linux-x86_64.AppImage.zsync

          tar --exclude='.git' -czf LauncherVit-${{ env.VERSION }}.tar.gz LauncherVit-${{ env.VERSION }}

          for d in LauncherVit-Windows-MSVC-Setup*; do
            [ -d "$d" ] || continue
            mv "$d"/LauncherVit-*.exe LauncherVit-Windows-MSVC-Setup-${{ env.VERSION }}.exe
          done

          for d in LauncherVit-Windows-MSVC-Portable*; do
            [ -d "$d" ] || continue
            cd "$d"
            zip -r -9 "../LauncherVit-Windows-MSVC-Portable-${{ env.VERSION }}.zip" *
            cd ..
          done

          for d in LauncherVit-Windows-MSVC-[0-9]*; do
            [ -d "$d" ] || continue
            cd "$d"
            zip -r -9 "../LauncherVit-Windows-MSVC-${{ env.VERSION }}.zip" *
            cd ..
          done

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref }}
          name: LauncherVit ${{ env.VERSION }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            LauncherVit-Linux-x86_64.AppImage
            LauncherVit-Linux-x86_64.AppImage.zsync
            LauncherVit-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz
            LauncherVit-Windows-MSVC-${{ env.VERSION }}.zip
            LauncherVit-Windows-MSVC-Portable-${{ env.VERSION }}.zip
            LauncherVit-Windows-MSVC-Setup-${{ env.VERSION }}.exe
            LauncherVit-${{ env.VERSION }}.tar.gz
